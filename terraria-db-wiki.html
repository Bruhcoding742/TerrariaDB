<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerrariaDB</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f0e14;
  --surface: #17151f;
  --card:    #1e1b2a;
  --border:  #2a2540;
  --accent:  #a855f7;
  --acc2:    #7c3aed;
  --gold:    #f59e0b;
  --green:   #10b981;
  --red:     #ef4444;
  --blue:    #3b82f6;
  --cyan:    #06b6d4;
  --pink:    #ec4899;
  --text:    #e2dff0;
  --muted:   #6b6484;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── TOPBAR ── */
#topbar{
  height:54px;background:#09080f;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 18px;
  position:sticky;top:0;z-index:200;flex-shrink:0;
}
.logo{
  font-family:'Press Start 2P',monospace;font-size:9px;
  color:var(--accent);text-shadow:0 0 18px rgba(168,85,247,.5);
  white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:7px;
}
.search-wrap{
  flex:1;max-width:460px;position:relative;
}
.search-wrap input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;padding:7px 14px 7px 36px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--accent);background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);padding:3px 10px;border-radius:5px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 54px);overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:205px;background:#09080f;border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;padding:10px 0;
}
.sb-section-title{
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);padding:10px 16px 5px;
}
.sb-item{
  display:flex;align-items:center;gap:9px;padding:9px 16px;
  font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;
  border-left:3px solid transparent;transition:all .1s;user-select:none;
}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.active{color:var(--accent);background:rgba(168,85,247,.07);border-left-color:var(--accent)}
.sb-item.active .sb-count{color:var(--accent);background:rgba(168,85,247,.18)}
.sb-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-count{margin-left:auto;font-size:10px;font-weight:800;padding:1px 6px;border-radius:3px;background:var(--surface);color:var(--border)}
.sb-divider{height:1px;background:var(--border);margin:8px 14px}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;padding:20px}

/* page header */
.pg-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.pg-title{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--text);line-height:1.7}
.pg-count{font-size:12px;color:var(--muted);font-weight:700}
.pg-head a{margin-left:auto;font-size:11px;font-weight:700;color:var(--blue);border:1px solid rgba(59,130,246,.3);padding:4px 10px;border-radius:5px;text-decoration:none;background:rgba(59,130,246,.07);transition:all .15s}
.pg-head a:hover{background:rgba(59,130,246,.15)}

/* filter chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.chip{
  font-size:12px;font-weight:700;padding:4px 11px;border-radius:5px;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  cursor:pointer;transition:all .1s;font-family:'Nunito',sans-serif;
}
.chip:hover{color:var(--text);border-color:var(--muted)}
.chip.on{background:rgba(168,85,247,.14);border-color:var(--accent);color:var(--accent)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}

/* ── CARD ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
  animation:fadeUp .18s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-2px);border-color:rgba(168,85,247,.4);box-shadow:0 6px 22px rgba(0,0,0,.45),0 0 0 1px rgba(168,85,247,.2)}
.card-top{display:flex;align-items:center;gap:11px;padding:12px 13px 10px;border-bottom:1px solid var(--border)}
.card-icon{width:44px;height:44px;background:#09080f;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.card-icon img{width:32px;height:32px;image-rendering:pixelated}
.card-names{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-type{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.card-body{padding:10px 13px}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:11.5px;margin-bottom:7px}
.cs{display:flex;justify-content:space-between}
.cs-k{color:var(--muted);font-weight:600}
.cs-v{font-weight:800}
.card-desc{font-size:11px;color:var(--muted);font-weight:600;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}

/* rarity badge */
.rar-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;border:1px solid;flex-shrink:0;white-space:nowrap}
.rar-0{color:#aaa;border-color:#444;background:rgba(170,170,170,.08)}
.rar-1{color:#fff;border-color:#888;background:rgba(240,240,240,.08)}
.rar-2{color:#7ecef4;border-color:#2563eb;background:rgba(126,206,244,.08)}
.rar-3{color:#a5fb78;border-color:#16a34a;background:rgba(165,251,120,.08)}
.rar-4{color:#ff9a3c;border-color:#c2410c;background:rgba(255,154,60,.08)}
.rar-5{color:#f87171;border-color:#dc2626;background:rgba(248,113,113,.08)}
.rar-6{color:#c084fc;border-color:#7c3aed;background:rgba(192,132,252,.08)}
.rar-7{color:#f5da4b;border-color:#b45309;background:rgba(245,218,75,.08)}
.rar-8{color:#fca5a5;border-color:#e11d48;background:rgba(252,165,165,.08)}
.rar-9{color:#fbbf24;border-color:#92400e;background:rgba(251,191,36,.08)}
.rar-10{color:#f9a8d4;border-color:#db2777;background:linear-gradient(90deg,rgba(248,113,113,.08),rgba(251,191,36,.08),rgba(52,211,153,.08))}
.rar-11{color:#fff;border-color:#fff;background:rgba(255,255,255,.06)}

/* ── LOADER ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--accent);animation:blink 1s infinite;letter-spacing:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.loader-sub{font-size:12px;color:var(--muted);font-weight:700}

/* ── ERROR ── */
.err{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25);border-radius:7px;padding:16px 20px;color:#f87171;font-size:13px;font-weight:700;margin:10px 0;line-height:1.7}

/* ── EMPTY ── */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-ico{font-size:50px;margin-bottom:12px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:10px;box-shadow:0 0 60px rgba(168,85,247,.22);width:100%;max-width:650px;max-height:90vh;overflow-y:auto;position:relative;animation:popIn .17s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:13px;right:13px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;z-index:10}
.modal-close:hover{background:rgba(239,68,68,.12);border-color:var(--red);color:var(--red)}
.modal-hero{background:linear-gradient(135deg,#1a1530,#09080f);border-radius:10px 10px 0 0;padding:22px;display:flex;gap:18px;border-bottom:1px solid var(--border)}
.modal-ico{width:76px;height:76px;background:#09080f;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0;overflow:hidden}
.modal-ico img{width:56px;height:56px;image-rendering:pixelated}
.modal-title{font-size:17px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.3}
.modal-sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:9px}
.modal-body{padding:20px}
.msec{margin-bottom:18px}
.msec-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.stat-tbl{width:100%;border-collapse:collapse;font-size:13px;font-weight:600}
.stat-tbl tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,.04)}
.stat-tbl td{padding:6px 3px}
.stat-tbl td:first-child{color:var(--muted);width:42%}
.desc-box{background:rgba(0,0,0,.3);border-radius:6px;border-left:3px solid var(--accent);padding:11px 13px;font-size:13px;font-weight:600;line-height:1.7;color:var(--text)}
.wiki-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:6px;background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.28);color:var(--blue);font-size:12px;font-weight:700;text-decoration:none;transition:all .15s;margin-top:4px}
.wiki-btn:hover{background:rgba(59,130,246,.18)}
.note{font-size:11px;color:var(--muted);margin-top:8px;font-weight:600;line-height:1.6;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:5px}

/* ── PAGINATION ── */
.pager{display:flex;align-items:center;gap:8px;margin-top:18px;font-size:13px;font-weight:700}
.pager button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .12s}
.pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pager button:disabled{opacity:.35;cursor:not-allowed}
.pager-info{color:var(--muted)}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">⛏ TerrariaDB</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search within category…">
  </div>
  <div class="topbar-right"><div class="live-dot"></div>WIKI LIVE</div>
</div>

<div class="layout">
  <div id="sidebar">
    <div class="sb-section-title">Browse</div>

    <div class="sb-item active" data-cat="Weapon_items" data-label="Weapons" data-emoji="⚔️">
      <span class="sb-emoji">⚔️</span>Weapons<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Armor_items" data-label="Armor" data-emoji="🛡️">
      <span class="sb-emoji">🛡️</span>Armor<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Accessory_items" data-label="Accessories" data-emoji="💍">
      <span class="sb-emoji">💍</span>Accessories<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Potion_items" data-label="Potions" data-emoji="🧪">
      <span class="sb-emoji">🧪</span>Potions<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Tool_items" data-label="Tools" data-emoji="⛏️">
      <span class="sb-emoji">⛏️</span>Tools<span class="sb-count">…</span>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-item" data-cat="Bosses" data-label="Bosses" data-emoji="💀">
      <span class="sb-emoji">💀</span>Bosses<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Enemies" data-label="Enemies" data-emoji="👹">
      <span class="sb-emoji">👹</span>Enemies<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="NPCs" data-label="NPCs" data-emoji="🧑">
      <span class="sb-emoji">🧑</span>NPCs<span class="sb-count">…</span>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-item" data-cat="Ore_items" data-label="Ores" data-emoji="💎">
      <span class="sb-emoji">💎</span>Ores<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Bar_items" data-label="Bars" data-emoji="🟫">
      <span class="sb-emoji">🟫</span>Bars<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Block_items" data-label="Blocks" data-emoji="🪨">
      <span class="sb-emoji">🪨</span>Blocks<span class="sb-count">…</span>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-item" data-cat="Biomes" data-label="Biomes" data-emoji="🌿">
      <span class="sb-emoji">🌿</span>Biomes<span class="sb-count">…</span>
    </div>
    <div class="sb-item" data-cat="Events" data-label="Events" data-emoji="⚡">
      <span class="sb-emoji">⚡</span>Events<span class="sb-count">…</span>
    </div>
  </div>

  <div id="main"><div id="content"></div></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── CONFIG ──
const API = 'https://terraria.wiki.gg/w/api.php';
const IMG_BASE = 'https://terraria.wiki.gg/images/';
const PER_PAGE = 48;

// ── STATE ──
let activeCat  = 'Weapon_items';
let activeLabel = 'Weapons';
let allItems   = [];        // raw list from categorymembers
let pageCache  = {};        // pageid -> parsed detail
let listCache  = {};        // cat -> full item list
let searchQ    = '';
let activeTags = [];
let currentPage = 0;
let modalItem  = null;

// ── RARITY MAP ──
const RARITY_NAMES = ['Gray','White','Blue','Green','Orange','Red','Purple','Lime','Yellow','Cyan','Rainbow','Fiery Red'];

// ── HELPERS ──
function rarClass(n) {
  const i = parseInt(n);
  return isNaN(i) ? 'rar-0' : `rar-${Math.max(0,Math.min(11,i))}`;
}
function rarName(n) {
  const i = parseInt(n);
  return isNaN(i) ? '' : (RARITY_NAMES[i] || '');
}

// Strip wikitext markup to plain text
function stripWiki(s) {
  if (!s) return '';
  return s
    .replace(/\[\[(?:[^\]|]*\|)?([^\]]*)\]\]/g, '$1')
    .replace(/\{\{[^}]*\}\}/g, '')
    .replace(/<[^>]+>/g, '')
    .replace(/'''+/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Extract a template param value
function tplParam(wikitext, key) {
  const re = new RegExp(`\\|\\s*${key}\\s*=\\s*([^|\\n}]+)`, 'i');
  const m = wikitext.match(re);
  return m ? stripWiki(m[1].trim()) : null;
}

// Image URL from filename
function imgUrl(name) {
  if (!name) return null;
  const clean = name.replace(/^File:/i,'').replace(/ /g,'_');
  // MD5 thumb path like MediaWiki
  try {
    const enc = encodeURIComponent(clean).replace(/%20/g,'_');
    return `${IMG_BASE}${enc}`;
  } catch { return null; }
}

// Wiki page URL
function wikiUrl(title) {
  return `https://terraria.wiki.gg/wiki/${encodeURIComponent(title.replace(/ /g,'_'))}`;
}

// ── FETCH HELPERS ──
async function apiFetch(params) {
  const url = new URL(API);
  params.format = 'json';
  params.origin = '*';
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// Get all category members (handles continue)
async function getCategoryMembers(cat) {
  if (listCache[cat]) return listCache[cat];
  let items = [], cmcontinue = undefined;
  do {
    const p = { action:'query', list:'categorymembers', cmtitle:`Category:${cat}`, cmlimit:500, cmnamespace:0 };
    if (cmcontinue) p.cmcontinue = cmcontinue;
    const data = await apiFetch(p);
    const members = data?.query?.categorymembers || [];
    items.push(...members.map(m => ({ pageid: m.pageid, title: m.title })));
    cmcontinue = data?.continue?.cmcontinue;
  } while (cmcontinue);
  listCache[cat] = items;
  return items;
}

// Get page wikitext (batch up to 20)
async function getPageDetails(pageids) {
  const missing = pageids.filter(id => !pageCache[id]);
  if (missing.length === 0) return;
  // batch in groups of 20
  for (let i = 0; i < missing.length; i += 20) {
    const batch = missing.slice(i, i+20);
    const data = await apiFetch({
      action: 'query',
      pageids: batch.join('|'),
      prop: 'revisions|pageimages',
      rvprop: 'content',
      rvslots: 'main',
      piprop: 'thumbnail',
      pithumbsize: 64,
    });
    const pages = data?.query?.pages || {};
    for (const [id, page] of Object.entries(pages)) {
      const wikitext = page?.revisions?.[0]?.slots?.main?.['*'] || '';
      const thumb = page?.thumbnail?.source || null;
      pageCache[id] = { title: page.title, wikitext, thumb };
    }
  }
}

// Parse item stats from wikitext
function parseItem(pageid, title) {
  const cached = pageCache[pageid];
  const wikitext = cached?.wikitext || '';
  const thumb = cached?.thumb || null;

  // Attempt to pull key infobox fields
  const damage     = tplParam(wikitext, 'damage');
  const defense    = tplParam(wikitext, 'defense');
  const rarity     = tplParam(wikitext, 'rarity');
  const buyVal     = tplParam(wikitext, 'buy');
  const sellVal    = tplParam(wikitext, 'sell');
  const tooltip    = tplParam(wikitext, 'tooltip');
  const useTime    = tplParam(wikitext, 'usetime') || tplParam(wikitext, 'use time');
  const knockback  = tplParam(wikitext, 'knockback');
  const crit       = tplParam(wikitext, 'crit');
  const hp         = tplParam(wikitext, 'life') || tplParam(wikitext, 'hp') || tplParam(wikitext, 'max life');
  const mana       = tplParam(wikitext, 'mana');
  const setBonus   = tplParam(wikitext, 'setbonus') || tplParam(wikitext, 'set bonus');
  const duration   = tplParam(wikitext, 'duration');
  const type       = tplParam(wikitext, 'type');
  const autoswing  = tplParam(wikitext, 'autoswing');

  // Build stats object — only include non-null fields
  const stats = {};
  if (damage)    stats['Damage']    = damage;
  if (defense)   stats['Defense']   = defense;
  if (hp)        stats['HP']        = hp;
  if (useTime)   stats['Use Time']  = useTime;
  if (knockback) stats['Knockback'] = knockback;
  if (crit)      stats['Crit']      = crit + '%';
  if (mana)      stats['Mana']      = mana;
  if (setBonus)  stats['Set Bonus'] = setBonus;
  if (duration)  stats['Duration']  = duration;
  if (sellVal)   stats['Sell']      = sellVal;
  if (buyVal)    stats['Buy']       = buyVal;

  // Tags from type field + hardmode detection
  const tags = [];
  if (type) type.split(',').forEach(t => { const s = stripWiki(t).trim(); if (s && s.length < 30) tags.push(s); });
  if (/hardmode/i.test(wikitext)) tags.push('Hardmode');
  if (/pre.hardmode/i.test(wikitext)) tags.push('Pre-Hardmode');
  if (/boss/i.test(wikitext) && activeCat === 'Bosses') tags.push('Boss');
  if (autoswing === 'y' || autoswing === 'true') tags.push('Autoswing');

  return {
    pageid, title,
    thumb,
    rarity: rarity || '0',
    stats,
    tooltip: tooltip ? stripWiki(tooltip) : null,
    tags: [...new Set(tags)].slice(0, 5),
  };
}

// ── RENDER ──
function showLoader(label) {
  document.getElementById('content').innerHTML = `
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-txt">LOADING ${label.toUpperCase()}</div>
      <div class="loader-sub">Fetching from terraria.wiki.gg…</div>
    </div>`;
}

function getVisible() {
  const q = searchQ.toLowerCase();
  return allItems.filter(item => {
    const matchQ = !q || item.title.toLowerCase().includes(q);
    const parsed = pageCache[item.pageid];
    const matchQExtra = parsed && q ? JSON.stringify(parsed).toLowerCase().includes(q) : false;
    const matchF = activeTags.length === 0 || (() => {
      if (!parsed) return false;
      const p = parseItem(item.pageid, item.title);
      return activeTags.every(t => p.tags.includes(t));
    })();
    return (matchQ || matchQExtra) && matchF;
  });
}

function getAllTags() {
  const s = new Set();
  allItems.forEach(item => {
    if (pageCache[item.pageid]) {
      parseItem(item.pageid, item.title).tags.forEach(t => s.add(t));
    }
  });
  return [...s].slice(0, 16);
}

function statColor(k) {
  const key = k.toLowerCase();
  if (key.includes('damage') || key.includes('hp') || key.includes('life')) return 'var(--red)';
  if (key.includes('defense'))          return 'var(--blue)';
  if (key.includes('use time') || key.includes('speed')) return 'var(--cyan)';
  if (key.includes('mana'))             return '#c084fc';
  if (key.includes('crit'))             return 'var(--gold)';
  if (key.includes('bonus') || key.includes('effect') || key.includes('duration')) return 'var(--green)';
  if (key.includes('sell') || key.includes('buy'))  return 'var(--gold)';
  return 'var(--text)';
}

function renderGrid() {
  const visible = getVisible();
  const totalPages = Math.ceil(visible.length / PER_PAGE);
  if (currentPage >= totalPages) currentPage = 0;
  const slice = visible.slice(currentPage * PER_PAGE, (currentPage + 1) * PER_PAGE);

  const allTags = getAllTags();

  let html = `
    <div class="pg-head">
      <span style="font-size:22px">${document.querySelector('.sb-item.active')?.dataset.emoji || ''}</span>
      <div class="pg-title">${activeLabel}</div>
      <div class="pg-count">${visible.length} entries</div>
      <a href="https://terraria.wiki.gg/wiki/Category:${activeCat}" target="_blank">View on Wiki ↗</a>
    </div>`;

  if (allTags.length > 0) {
    html += `<div class="chips">${allTags.map(t =>
      `<button class="chip${activeTags.includes(t)?' on':''}" onclick="toggleTag('${t.replace(/'/g,"\\'")}')">${t}</button>`
    ).join('')}</div>`;
  }

  if (slice.length === 0) {
    html += `<div class="empty"><div class="empty-ico">🔍</div><div style="font-weight:700;font-size:14px;color:var(--text)">No results</div></div>`;
  } else {
    html += `<div class="grid">${slice.map((item, i) => {
      const p = pageCache[item.pageid] ? parseItem(item.pageid, item.title) : null;
      const stats = p ? Object.entries(p.stats).slice(0,4) : [];
      const delay = Math.min(i, 24) * 0.025;
      return `<div class="card" onclick="openModal(${item.pageid})" style="animation-delay:${delay}s">
        <div class="card-top">
          <div class="card-icon">
            ${p?.thumb ? `<img src="${p.thumb}" alt="" onerror="this.parentElement.innerHTML='📦'">` : '📦'}
          </div>
          <div class="card-names">
            <div class="card-name">${item.title}</div>
            <div class="card-type">${activeLabel.replace(/s$/,'')}</div>
          </div>
          ${p?.rarity ? `<div class="rar-badge ${rarClass(p.rarity)}">${rarName(p.rarity)||'—'}</div>` : ''}
        </div>
        <div class="card-body">
          ${stats.length ? `<div class="card-stats">${stats.map(([k,v]) =>
            `<div class="cs"><span class="cs-k">${k}</span><span class="cs-v" style="color:${statColor(k)}">${v}</span></div>`
          ).join('')}</div>` : (p ? '' : '<div class="loader-sub" style="font-size:11px">Loading…</div>')}
          ${p?.tooltip ? `<div class="card-desc">${p.tooltip}</div>` : ''}
          <div class="card-tags">${(p?.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
    }).join('')}</div>`;

    if (totalPages > 1) {
      html += `<div class="pager">
        <button onclick="changePage(-1)"${currentPage===0?' disabled':''}>← Prev</button>
        <span class="pager-info">Page ${currentPage+1} of ${totalPages}</span>
        <button onclick="changePage(1)"${currentPage>=totalPages-1?' disabled':''}>Next →</button>
      </div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

function changePage(dir) {
  currentPage += dir;
  renderGrid();
  document.getElementById('main').scrollTo(0,0);
}

function toggleTag(tag) {
  if (activeTags.includes(tag)) activeTags = activeTags.filter(t=>t!==tag);
  else activeTags.push(tag);
  currentPage = 0;
  renderGrid();
}

// ── LOAD CATEGORY ──
async function loadCategory(cat, label) {
  activeCat  = cat;
  activeLabel = label;
  searchQ    = '';
  activeTags = [];
  currentPage = 0;
  document.getElementById('searchInput').value = '';

  showLoader(label);

  try {
    // 1. Get member list
    allItems = await getCategoryMembers(cat);

    // Update sidebar count
    const countEl = document.querySelector(`.sb-item.active .sb-count`);
    if (countEl) countEl.textContent = allItems.length;

    // 2. Render immediately with placeholders
    renderGrid();

    // 3. Fetch details for first page in background
    const firstPage = allItems.slice(0, PER_PAGE);
    await getPageDetails(firstPage.map(i=>i.pageid));
    renderGrid();

    // 4. Fetch rest in background quietly
    for (let i = PER_PAGE; i < allItems.length; i += 50) {
      const batch = allItems.slice(i, i+50).map(x=>x.pageid);
      getPageDetails(batch).then(() => renderGrid()).catch(()=>{});
    }

  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="err">⚠ ${e.message}<br><small>Check your connection. The wiki API requires internet access.</small></div>`;
  }
}

// ── MODAL ──
async function openModal(pageid) {
  const item = allItems.find(i=>i.pageid===pageid);
  if (!item) return;

  if (!pageCache[pageid]) {
    await getPageDetails([pageid]);
  }

  const p = parseItem(pageid, item.title);
  const url = wikiUrl(item.title);

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-hero">
      <div class="modal-ico">
        ${p.thumb ? `<img src="${p.thumb}" alt="" onerror="this.parentElement.innerHTML='📦'">` : '📦'}
      </div>
      <div>
        <div class="modal-title">${item.title}</div>
        <div class="modal-sub">${activeLabel.replace(/s$/,'')}${p.rarity ? ' · <span class="rar-badge '+rarClass(p.rarity)+'" style="font-size:10px">'+rarName(p.rarity)+' Rarity</span>' : ''}</div>
        <div class="card-tags" style="margin-top:6px">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="modal-body">
      ${Object.keys(p.stats).length ? `
        <div class="msec">
          <div class="msec-title">Stats</div>
          <table class="stat-tbl"><tbody>
            ${Object.entries(p.stats).map(([k,v])=>`<tr><td>${k}</td><td style="color:${statColor(k)}">${v}</td></tr>`).join('')}
          </tbody></table>
        </div>` : ''}
      ${p.tooltip ? `
        <div class="msec">
          <div class="msec-title">Tooltip</div>
          <div class="desc-box">"${p.tooltip}"</div>
        </div>` : ''}
      <div class="msec">
        <div class="msec-title">Wiki Article</div>
        <a class="wiki-btn" href="${url}" target="_blank">📖 Open full article on terraria.wiki.gg →</a>
        <div class="note">For complete drop tables, crafting recipes, and lore, visit the wiki article above.</div>
      </div>
    </div>`;

  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

// ── SIDEBAR CLICKS ──
document.querySelectorAll('.sb-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    loadCategory(el.dataset.cat, el.dataset.label);
  });
});

// ── SEARCH ──
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = this.value.trim();
    currentPage = 0;
    renderGrid();
  }, 180);
});

// ── CLOSE MODAL ──
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target===document.getElementById('modalBg')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── INIT ──
loadCategory('Weapon_items', 'Weapons');
</script>
